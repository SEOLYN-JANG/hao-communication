name: 칼럼 자동 발행

on:
  schedule:
    # 월·수·금 00:00 UTC = 한국시간 09:00 (주 3회)
    - cron: "0 0 * * 1,3,5"
  workflow_dispatch: {}   # 수동 실행 버튼

permissions:
  contents: write

concurrency:
  group: publish-column
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: AI 칼럼 생성
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bash scripts/generate_post.sh

      - name: 사이트 빌드
        run: bash build.sh

      - name: 커밋 & 푸시 (→ GitHub Pages 자동 배포)
        run: |
          git config user.name "hao-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "변경 사항 없음"
          else
            git commit -m "chore: 칼럼 자동 발행 ($(date +%F))"
            git push
          fi
